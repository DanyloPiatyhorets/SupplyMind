databases:
  - name: supplymind-db
    plan: free
    databaseName: supplymind
    user: supplymind

services:
  - type: web
    name: supplymind-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: MODELARK_API_KEY
        sync: false
      - key: MODELARK_BASE_URL
        value: https://ark.ap-southeast.bytepluses.com/api/v3
      - key: MODELARK_MODEL_ID
        value: deepseek-v3-1-250821
      - key: USE_MOCK_LLM
        value: "false"
      - key: USE_MOCK_SEARCH
        value: "false"
      - key: USE_MOCK_VIKINGDB
        value: "true"
      - key: SERPER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: supplymind-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
