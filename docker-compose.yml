version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: supplymind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./backend/db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
